<!DOCTYPE HTML>

<head>
<meta charset="utf-8">

<title>Flow Player Multi-Canal</title>

<style>
/* Estilos base */
html, body { margin: 0; padding: 0; height: 100%; background: #000; font-family: Arial, sans-serif; overflow: hidden; }

#flow-player {
  max-width: 1000px;
  margin: auto;
  position: relative;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#flow-player video { width: 100%; height: 100%; object-fit: contain; display: block; }

/* Controles */
.controls {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  transition: opacity .25s;
  z-index: 10;
}

#fp_bar { flex: 1; cursor: pointer; height: 6px; border-radius: 3px; accent-color: #14abd1; }

button { background: none; border: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }

#fp_fs { position: absolute; top: 10px; right: 10px; z-index: 11; transition: opacity .25s; }

/* Menús flotantes (Calidad y Canales) */
.fp-menu {
  position: absolute;
  bottom: 70px;
  right: 15px;
  background: rgba(20, 20, 20, 0.95);
  color: #fff;
  border-radius: 8px;
  display: none;
  font-size: 14px;
  z-index: 100;
  max-height: 300px;
  overflow-y: auto;
  border: 1px solid #333;
  min-width: 150px;
}
.fp-menu div { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #222; }
.fp-menu div:hover { background: #14abd1; }

/* UI Auto-hide */
#flow-player.hide-ui .controls, #flow-player.hide-ui #fp_fs { opacity: 0; pointer-events: none; }

/* Responsive para iOS */
#flow-player.ios-landscape {
  transform: rotate(90deg);
  transform-origin: center;
  width: 100vh!important;
  height: 100vw!important;
  position: fixed!important;
  top: 0; left: 0;
  z-index: 9999;
}
</style>
</head>

<div id="flow-player">
  <video id="fp_video" playsinline autoplay></video>

  <!-- Boton Fullscreen -->
  <button id="fp_fs">
    <svg viewBox="0 0 24 24" width="28" height="28" stroke="#14abd1" stroke-width="3" fill="none">
      <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
    </svg>

  <div class="controls">

      <svg id="fp_icoPause" viewBox="0 0 24 24" width="30" height="30" fill="#fff" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
    </button>

    <input id="fp_bar" type="range" value="0" min="0" step="0.1">

    <button id="fp_mute">
      <svg id="fp_icoMute" viewBox="0 0 24 24" width="26" height="26" fill="#fff"><path d="M3 10v4h4l5 5V5L7 10z"/></svg>

      </svg>
    </button>
  </div>

  <!-- Menú de Canales -->

  <!-- Menú de Calidad -->

</div>

/* ELEMENTOS */
const video = document.getElementById("fp_video");
const bar = document.getElementById("fp_bar");
const play = document.getElementById("fp_play");
const icoPlay = document.getElementById("fp_icoPlay");
const icoPause = document.getElementById("fp_icoPause");
const mute = document.getElementById("fp_mute");
const fs = document.getElementById("fp_fs");
const gear = document.getElementById("fp_gear");
const btnList = document.getElementById("fp_list");
const qmenu = document.getElementById("fp_qmenu");
const chmenu = document.getElementById("fp_chmenu");
const box = document.getElementById("flow-player");

let player;

/* INICIALIZAR SHAKA */
async function initApp() {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) return;

  player = new shaka.Player(video);
  player.addEventListener("error", (e) => console.error("Error:", e.detail));

  // Cargar lista de canales en el menú
  setupChannelMenu();

  // Cargar primer canal por defecto
  loadChannel(0);
}

function setupChannelMenu() {
  chmenu.innerHTML = "<b>Seleccionar Canal</b>";
  CANALES.forEach((ch, index) => {
    const div = document.createElement("div");
    div.textContent = ch.nombre;
    div.onclick = () => {
      loadChannel(index);
      chmenu.style.display = "none";
    };
    chmenu.appendChild(div);
  });
}

async function loadChannel(index) {
  const canal = CANALES[index];
  console.log("Cargando:", canal.nombre);

  const config = {
    abr: { enabled: true },
    preferredAudioLanguage: "es"
  };

  if (canal.drm) {
    config.drm = { clearKeys: canal.drm };
  } else {
    config.drm = { clearKeys: {} };
  }

  player.configure(config);

  try {
    await player.load(canal.url);
    updateQualityMenu();
  } catch (e) {
    console.error("Error cargando canal", e);
  }
}

function updateQualityMenu() {
  const tracks = player.getVariantTracks();
  qmenu.innerHTML = "<b>Calidad</b>";
  
  const auto = document.createElement("div");
  auto.textContent = "Auto";
  auto.onclick = () => { player.configure({ abr: { enabled: true } }); qmenu.style.display = "none"; };
  qmenu.appendChild(auto);

  // Filtrar y ordenar resoluciones únicas
  const uniqueHeights = [...new Set(tracks.map(t => t.height).filter(h => h))].sort((a,b)=>b-a);
  
  uniqueHeights.forEach(h => {
    const div = document.createElement("div");
    div.textContent = h + "p";
    div.onclick = () => {
      const track = tracks.find(t => t.height === h);
      player.configure({ abr: { enabled: false } });
      player.selectVariantTrack(track, true);
      qmenu.style.display = "none";
    };
    qmenu.appendChild(div);
  });
}

/* CONTROLES DE REPRODUCCIÓN (Mantenidos del original) */
play.onclick = () => video.paused ? video.play() : video.pause();
video.onplay = () => { icoPlay.style.display = "none"; icoPause.style.display = "block"; showUI(); };
video.onpause = () => { icoPlay.style.display = "block"; icoPause.style.display = "none"; box.classList.remove("hide-ui"); };

video.ontimeupdate = () => { bar.max = video.duration || 0; bar.value = video.currentTime; };
bar.oninput = () => video.currentTime = bar.value;
mute.onclick = () => video.muted = !video.muted;

function toggleFS() {
  if (!document.fullscreenElement) box.requestFullscreen();
  else document.exitFullscreen();
}
fs.onclick = toggleFS;
video.ondblclick = toggleFS;

gear.onclick = (e) => {
  e.stopPropagation();
  chmenu.style.display = "none";
  qmenu.style.display = qmenu.style.display === "block" ? "none" : "block";
};

btnList.onclick = (e) => {
  e.stopPropagation();
  qmenu.style.display = "none";
  chmenu.style.display = chmenu.style.display === "block" ? "none" : "block";
};

document.addEventListener("click", () => {
  qmenu.style.display = "none";
  chmenu.style.display = "none";
});

/* AUTO HIDE UI */
let uiTimer;
function showUI() {
  box.classList.remove("hide-ui");
  clearTimeout(uiTimer);
  if (!video.paused) {
    uiTimer = setTimeout(() => { box.classList.add("hide-ui"); }, 3000);
  }
}
box.addEventListener("mousemove", showUI);
box.addEventListener("touchstart", showUI);

/* LANDSCAPE IOS */
const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
document.addEventListener("fullscreenchange", async () => {
  if (document.fullscreenElement) {
    if (!isIOS && screen.orientation?.lock) try { await screen.orientation.lock("landscape") } catch (e) {}
    if (isIOS) box.classList.add("ios-landscape");
  } else {
    if (!isIOS && screen.orientation?.unlock) try { screen.orientation.unlock() } catch (e) {}
    box.classList.remove("ios-landscape");
  }
});

initApp();
</script>
